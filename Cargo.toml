[package]
name = "matrix-discord-bridge"
version = "0.1.0"
edition = "2024"

[dependencies]
# Runtime
tokio = { version = "1.48.0", features = ["full"] }

# HTTP
hyper = { version = "1.7.0", features = ["full"] }
hyper-util = { version = "0.1.17", features = ["full"] }
http-body-util = { version = "0.1.3", features = ["full"] }

# Discord
serenity = { version = "0.12.4", features = ["client", "gateway", "model", "cache"] }
secrecy = "0.8.0"

# Matrix
ruma = { version = "0.13.0", features = ["appservice-api", "client-api", "events"] }
ruma-client = { version = "0.16.0", features = ["hyper-rustls", "client-api"] }

# Serialization
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"

# Persistence
sqlx = { version = "0.8.6", features = ["runtime-tokio-rustls", "sqlite"] }

# Utils
anyhow = "1.0.100"
thiserror = "2.0.17"
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.20", features = ["env-filter"] }
url = "2.5.7"
regex = "1.12.2"
parking_lot = "0.12.5"
once_cell = "1.21.3"
urlencoding = "2.1.3"
uuid = { version = "1.18.1", features = ["v4"] }

# Markdown
pulldown-cmark = "0.13.0"
reqwest = { version = "0.12.24", features = ["json"] }
futures = "0.3.31"
html-escape = "0.2.13"

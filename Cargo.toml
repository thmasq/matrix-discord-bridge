[package]
name = "matrix-discord-bridge"
version = "0.1.0"
edition = "2024"

#   incompatible: ruma, ruma-client, secrecy

[dependencies]
# Runtime
tokio = { version = "1.52.1", features = ["full"] }

# HTTP
hyper = { version = "1.9.0", features = ["full"] }
hyper-util = { version = "0.1.20", features = ["full"] }
http-body-util = { version = "0.1.3", features = ["full"] }

# Discord
serenity = { version = "0.12.5", features = ["client", "gateway", "model", "cache"] }
secrecy = "0.10.3"

# Matrix
ruma = { version = "0.15.1", features = ["appservice-api", "client-api", "events"] }
ruma-client = { version = "0.18.0", features = ["hyper-rustls", "client-api"] }

# Serialization
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"

# Persistence
sqlx = { version = "0.8.6", features = ["runtime-tokio-rustls", "sqlite"] }

# Utils
anyhow = "1.0.102"
thiserror = "2.0.18"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
url = "2.5.8"
regex = "1.12.3"
parking_lot = "0.12.5"
once_cell = "1.21.4"
urlencoding = "2.1.3"
uuid = { version = "1.23.1", features = ["v4"] }

# Markdown
pulldown-cmark = "0.13.3"
reqwest = { version = "0.13.3", features = ["json", "multipart"] }
futures = "0.3.32"
html-escape = "0.2.13"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true
